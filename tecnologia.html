<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tecnología | clubdepromos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="tecnologia.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="container nav">
    <a href="index.html" class="logo">clubde<span>promos</span></a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="index.html#destacados">Ofertas</a>
      <a href="index.html#categorias">Categorías</a>
    </nav>
  </div>
</header>

<section class="products-section">
  <div class="container">

    <div class="top-bar">
      <h1>💻 Tecnología</h1>

      <select id="sortSelect">
        <option value="sold">Más vendidos</option>
        <option value="low">Más baratos</option>
        <option value="high">Más caros</option>
      </select>
    </div>

    <div class="products-grid" id="productsGrid">

      <a href="https://meli.la/2A7RGr2" target="_blank" class="product-card" data-price="299000" data-sold="149">
        <img src="img/starlink.jpg" alt="">
        <h4>Starlink Mini X</h4>
        <p class="price">$299.000</p>
      </a>

      <a href="https://meli.la/2M4o7qk" target="_blank" class="product-card" data-price="285439" data-sold="5000">
        <img src="img/noblex-32.jpg" alt="">
        <h4>Smart TV Noblex 32"</h4>
        <p class="price">$285.439</p>
      </a>

      <a href="https://meli.la/1pL4Rtp" target="_blank" class="product-card" data-price="35499" data-sold="100000">
        <img src="img/repetidorwifi-tplink.jpg" alt="">
        <h4>Repetidor TP-Link RE200</h4>
        <p class="price">$35.499</p>
      </a>

      <a href="https://meli.la/2i8GhdM" target="_blank" class="product-card" data-price="176016" data-sold="10000">
        <img src="img/kindle.jpg" alt="">
        <h4>Amazon Kindle 2024</h4>
        <p class="price">$176.016</p>
      </a>

    </div>

  </div>
</section>

<script src="tecnologia.js"></script>
